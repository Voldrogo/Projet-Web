<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRVE - Statistiques</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <header>
    <div class="logo">⚡ IRVE</div>
    <nav>
      <a href="../index.html">Accueil</a>
      <a href="visualisation.html">Points de charge</a>
      <a href="statistiques.html" class="actif">Statistiques</a>
    </nav>
  </header>

  <main>
    <h1 class="titre-page">Statistiques par département</h1>

    <section>
      <label for="select-dep">Choisir un département :</label>
      <select id="select-dep">
        <option value="">-- Sélectionnez --</option>
      </select>
    </section>

    <section id="zone-stats" style="display:none;">
      <div class="cartes-stats">
        <div class="carte-stat">
          <span class="valeur" id="stat-stations">-</span>
          <span class="libelle">Stations</span>
        </div>
        <div class="carte-stat">
          <span class="valeur" id="stat-pdc">-</span>
          <span class="libelle">Points de charge</span>
        </div>
        <div class="carte-stat">
          <span class="valeur" id="stat-puissance">-</span>
          <span class="libelle">Puissance moyenne (kW)</span>
        </div>
      </div>

      <div id="graphique-implantation"></div>
    </section>
  </main>

  <footer>
    <p>Projet Big Data / IA / Web — FISE3 2026 — Trinôme 9</p>
  </footer>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="../assets/js/statistiques.js"></script>
</body>
</html>
