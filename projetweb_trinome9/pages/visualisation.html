<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRVE - Points de charge</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

  <header>
    <div class="logo">⚡ IRVE</div>
    <nav>
      <a href="../index.html">Accueil</a>
      <a href="visualisation.html" class="actif">Points de charge</a>
      <a href="statistiques.html">Statistiques</a>
    </nav>
  </header>

  <main>
    <h1 class="titre-page">Visualisation des points de charge</h1>

    <section>
      <h2>Tableau des points de charge</h2>
      <input type="text" id="filtre-station" list="liste-stations"
             placeholder="Filtrer par station..." oninput="filtrer()">
      <datalist id="liste-stations"></datalist>
      <table id="tableau-pdc">
        <thead>
          <tr>
            <th>ID</th>
            <th>Station</th>
            <th>Puissance (kW)</th>
            <th>Prise Type 2</th>
            <th>Prise Combo CCS</th>
            <th>Gratuit</th>
            <th>Paiement CB</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="pagination">
        <button id="btn-prec" onclick="pagePrecedente()">Précédent</button>
        <span id="info-page"></span>
        <button id="btn-suiv" onclick="pageSuivante()">Suivant</button>
      </div>
      <div class="actions">
        <a href="clusters.html" target="_blank" class="bouton">Prédire les clusters</a>
      </div>
    </section>

    <section>
      <h2>Carte des stations</h2>
      <div id="carte"></div>
    </section>
  </main>

  <footer>
    <p>Projet Big Data / IA / Web — FISE3 2026 — Trinôme 9</p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../assets/js/visualisation.js"></script>
</body>
</html>
